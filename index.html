<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Task — Project & Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --surface2: #181c24;
      --surface3: #1e232e;
      --border: #252c3a;
      --border2: #2d3748;
      --text: #e8ecf4;
      --text-2: #8896b0;
      --text-3: #4d5c78;
      --accent: #f59e0b;
      --accent-dim: rgba(245,158,11,0.12);
      --accent2: #38bdf8;
      --accent2-dim: rgba(56,189,248,0.1);
      --danger: #ef4444;
      --danger-dim: rgba(239,68,68,0.12);
      --success: #22c55e;
      --success-dim: rgba(34,197,94,0.12);
      --warning: #f59e0b;
      --purple: #a78bfa;
      --purple-dim: rgba(167,139,250,0.12);
      --radius: 8px;
      --radius-lg: 14px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body, #root { height:100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }
    input, textarea, select {
      font-family: inherit;
      outline: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 8px 12px;
      font-size: 14px;
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    select option { background: var(--surface2); }
    label { font-size: 12px; font-weight: 600; color: var(--text-2); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 5px; display: block; }
    .mono { font-family: 'Space Mono', monospace; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="/app.jsx"></script>
</body>
</html>
